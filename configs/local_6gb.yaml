profile_name: local_6gb
random_seed: 17
skip_data_preparation_if_present: false
training_backend: auto
strict_backend: false
msmarco_max_rows: 160000
medical_max_records: 14000
legal_max_records: 8000
cyber_max_records: 18000
final_pair_target: 200000

baseline_embedding_model: qwen3-embedding:4b
trainable_model_name: Qwen/Qwen3-Embedding-0.6B
judge_model_primary: granite4.1:3b
judge_model_secondary: qwen3.5:4b

train_batch_size: 2
eval_batch_size: 4
grad_accum_steps: 8
learning_rate: 2.5e-4
train_epochs: 1
train_max_steps: 700
eval_every_steps: 100
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
gradient_checkpointing: true
unsloth_max_seq_length: 192
unsloth_load_in_4bit: true

retrieval_top_k: 10
rag_context_top_k: 6
graph_neighbor_hops: 1
inference_doc_limit: 2000
